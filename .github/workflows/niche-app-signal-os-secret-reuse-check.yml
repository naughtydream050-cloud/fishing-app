name: Niche App Signal OS Secret Reuse Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-reuse-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RAZOR_FACE_COMPANY/02_WEB_SERVICES/projects/niche-app-signal-os
    env:
      DRY_RUN: "true"
      AUTO_POST: "false"
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_AUTO_POST_ENABLED: ${{ secrets.THREADS_AUTO_POST_ENABLED }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      THREADS_TARGET_HANDLE: ${{ secrets.THREADS_TARGET_HANDLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm safe mode and secret references
        shell: bash
        run: |
          set -euo pipefail
          echo "DRY_RUN=${DRY_RUN}"
          echo "AUTO_POST=${AUTO_POST}"
          if [ -n "${THREADS_ACCESS_TOKEN:-}" ]; then echo "THREADS_ACCESS_TOKEN=set"; else echo "THREADS_ACCESS_TOKEN=missing"; fi
          if [ -n "${THREADS_USER_ID:-}" ]; then echo "THREADS_USER_ID=set"; else echo "THREADS_USER_ID=missing"; fi
          if [ -n "${THREADS_AUTO_POST_ENABLED:-}" ]; then echo "THREADS_AUTO_POST_ENABLED=set"; else echo "THREADS_AUTO_POST_ENABLED=missing"; fi
          if [ -n "${CRON_SECRET:-}" ]; then echo "CRON_SECRET=set"; else echo "CRON_SECRET=missing"; fi
          if [ -n "${THREADS_TARGET_HANDLE:-}" ]; then echo "THREADS_TARGET_HANDLE=set"; else echo "THREADS_TARGET_HANDLE=missing"; fi
          echo "No Threads API posting is attempted by this workflow."
