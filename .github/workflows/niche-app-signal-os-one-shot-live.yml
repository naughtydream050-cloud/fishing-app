name: Niche App Signal OS One Shot Live

on:
  push:
    branches:
      - codex/niche-market-auto-post-live

permissions:
  contents: write

jobs:
  one-shot-live:
    if: contains(github.event.head_commit.message, '[niche-live-post-now]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RAZOR_FACE_COMPANY/02_WEB_SERVICES/projects/niche-app-signal-os
    env:
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_AUTO_POST_ENABLED: ${{ secrets.THREADS_AUTO_POST_ENABLED }}
      THREADS_TARGET_HANDLE: younengsaitoshaojie
      AUTO_POST: "false"
      DRY_RUN: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Japanese fonts for UI card screenshots
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Set JST run date
        shell: bash
        run: |
          set -euo pipefail
          echo "RUN_DATE=$(TZ=Asia/Tokyo date +%F)" >> "$GITHUB_ENV"

      - name: Preflight guard
        shell: bash
        run: |
          set -euo pipefail
          test "${THREADS_AUTO_POST_ENABLED:-}" = "true"
          test -n "${THREADS_ACCESS_TOKEN:-}"
          test -n "${THREADS_USER_ID:-}"
          test "${THREADS_TARGET_HANDLE}" = "younengsaitoshaojie"

      - name: Generate selected market-backed candidate
        shell: bash
        run: |
          set -euo pipefail
          AUTO_POST=false DRY_RUN=true python scripts/run_daily_pipeline.py --dry-run

      - name: Commit generated artifacts before posting
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output memory data/post_log.json data/post_history.json reports/latest/context-pack.json
          if git diff --cached --quiet; then
            echo "No generated artifact changes."
          else
            git commit -m "chore: prepare niche app signal os live post"
            git push
          fi

      - name: Live post through guarded selected candidate
        shell: bash
        run: |
          set -euo pipefail
          POST_COMMIT_SHA="$(git rev-parse HEAD)"
          AUTO_POST=true DRY_RUN=false GITHUB_SHA="${POST_COMMIT_SHA}" python scripts/post_to_threads.py

      - name: Commit live posting result immediately
        shell: bash
        run: |
          set -euo pipefail
          git add data/post_log.json data/post_history.json output/reports/publishing.json output/reports/live_post_result.json output/reports/live_post_result.md reports/latest/context-pack.json
          if git diff --cached --quiet; then
            echo "No immediate live posting result changes."
          else
            git commit -m "chore: record niche app signal os live post result"
            git push
          fi

      - name: Update reaction memory after live post
        shell: bash
        run: |
          set -euo pipefail
          python scripts/fetch_threads_insights.py
          python scripts/update_reaction_memory.py
          python scripts/analyze_learning.py

      - name: Commit live reaction memory
        shell: bash
        run: |
          set -euo pipefail
          git add data/reaction_memory.json output/reports/threads_insights.json output/reports/reaction_memory.json output/reports/learning.json memory/reaction memory/reports/weekly_report.md reports/latest/context-pack.json
          if git diff --cached --quiet; then
            echo "No live reaction memory changes."
          else
            git commit -m "chore: update niche app signal os reaction memory"
            git push
          fi
