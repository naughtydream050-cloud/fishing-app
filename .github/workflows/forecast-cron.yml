name: Daily Forecast Pipeline

on:
  schedule:
    # Run daily at 05:00 JST (20:00 UTC previous day)
    - cron: '0 20 * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  generate-forecasts:
    name: Generate deterministic fishing forecasts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run forecast pipeline
        run: npx tsx scripts/generate-forecasts.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Trigger Vercel ISR revalidation
        run: |
          curl -X POST "${{ secrets.VERCEL_REVALIDATE_URL }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_REVALIDATE_TOKEN }}" \
            || echo "Revalidation skipped (token not set)"
        continue-on-error: true

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Forecast pipeline failed. Check logs above."
          # Optional: add Slack/Discord webhook here
