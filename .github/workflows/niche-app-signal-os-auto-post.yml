name: Niche App Signal OS Auto Post

on:
  push:
    branches:
      - codex/niche-market-auto-post-live
    paths:
      - ".github/workflows/niche-app-signal-os-auto-post.yml"
      - "RAZOR_FACE_COMPANY/02_WEB_SERVICES/projects/niche-app-signal-os/scripts/**"
      - "RAZOR_FACE_COMPANY/02_WEB_SERVICES/projects/niche-app-signal-os/data/market_research_inputs.json"
      - "RAZOR_FACE_COMPANY/02_WEB_SERVICES/projects/niche-app-signal-os/data/market_research_sources.json"
      - "RAZOR_FACE_COMPANY/02_WEB_SERVICES/projects/niche-app-signal-os/data/audience_tone_rules.json"
  workflow_dispatch:
    inputs:
      live_post:
        description: "Set true to allow Threads posting through all guards."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "10 0 * * *"

permissions:
  contents: write

jobs:
  daily-post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RAZOR_FACE_COMPANY/02_WEB_SERVICES/projects/niche-app-signal-os
    env:
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_AUTO_POST_ENABLED: ${{ secrets.THREADS_AUTO_POST_ENABLED }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      THREADS_TARGET_HANDLE: younengsaitoshaojie

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Japanese fonts for UI card screenshots
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Resolve posting mode
        shell: bash
        run: |
          set -euo pipefail
          echo "RUN_DATE=$(TZ=Asia/Tokyo date +%F)" >> "$GITHUB_ENV"
          LIVE_POST="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.live_post }}" = "true" ]; then
            LIVE_POST="true"
          fi
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${THREADS_AUTO_POST_ENABLED:-}" = "true" ]; then
            LIVE_POST="true"
          fi

          if [ "$LIVE_POST" = "true" ]; then
            echo "LIVE_POST=true" >> "$GITHUB_ENV"
            echo "AUTO_POST=false" >> "$GITHUB_ENV"
            echo "DRY_RUN=true" >> "$GITHUB_ENV"
            echo "PIPELINE_ARGS=--dry-run" >> "$GITHUB_ENV"
          else
            echo "LIVE_POST=false" >> "$GITHUB_ENV"
            echo "AUTO_POST=false" >> "$GITHUB_ENV"
            echo "DRY_RUN=true" >> "$GITHUB_ENV"
            echo "PIPELINE_ARGS=--dry-run" >> "$GITHUB_ENV"
          fi
          echo "Resolved live_post=${LIVE_POST}"

      - name: Preflight guard
        shell: bash
        run: |
          set -euo pipefail
          echo "DRY_RUN=${DRY_RUN}"
          echo "AUTO_POST=${AUTO_POST}"
          echo "LIVE_POST=${LIVE_POST}"
          echo "THREADS_TARGET_HANDLE=${THREADS_TARGET_HANDLE}"
          if [ "${LIVE_POST}" = "true" ]; then
            test "${THREADS_AUTO_POST_ENABLED:-}" = "true"
            test -n "${THREADS_ACCESS_TOKEN:-}"
            test -n "${THREADS_USER_ID:-}"
            test "${THREADS_TARGET_HANDLE}" = "younengsaitoshaojie"
          fi

      - name: Verify tone pipeline order
        shell: bash
        run: |
          set -euo pipefail
          grep -n "fetch_public_market_sources" scripts/run_daily_pipeline.py
          grep -n "extract_market_needs" scripts/run_daily_pipeline.py
          grep -n "design_intelligence" scripts/run_daily_pipeline.py
          grep -n "select_niche_candidate" scripts/run_daily_pipeline.py
          grep -n "build_market_research_trace" scripts/run_daily_pipeline.py
          grep -n "audience_tone_adapter" scripts/run_daily_pipeline.py
          grep -n "generate_threads_post" scripts/run_daily_pipeline.py
          grep -n "generate_share_card" scripts/run_daily_pipeline.py
          grep -n "quality_risk_gate" scripts/run_daily_pipeline.py
          grep -n "select_post_candidate" scripts/run_daily_pipeline.py
          grep -n "post_source_audit" scripts/run_daily_pipeline.py

      - name: Run Niche App Signal OS pipeline
        shell: bash
        run: |
          set -euo pipefail
          AUTO_POST=false DRY_RUN=true python scripts/run_daily_pipeline.py ${PIPELINE_ARGS}

      - name: Commit generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            output \
            memory \
            data/post_log.json \
            data/post_history.json \
            reports/latest/context-pack.json
          if git diff --cached --quiet; then
            echo "No generated artifact changes."
          else
            git commit -m "chore: run niche app signal os pipeline"
            git push
          fi

      - name: Live post through guarded selected candidate
        if: env.LIVE_POST == 'true'
        shell: bash
        run: |
          set -euo pipefail
          POST_COMMIT_SHA="$(git rev-parse HEAD)"
          AUTO_POST=true DRY_RUN=false GITHUB_SHA="${POST_COMMIT_SHA}" python scripts/post_to_threads.py

      - name: Commit live posting result immediately
        if: env.LIVE_POST == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add \
            data/post_log.json \
            data/post_history.json \
            output/reports/publishing.json \
            output/reports/live_post_result.json \
            output/reports/live_post_result.md \
            reports/latest/context-pack.json
          if git diff --cached --quiet; then
            echo "No immediate live posting result changes."
          else
            git commit -m "chore: record niche app signal os live post result"
            git push
          fi

      - name: Update reaction memory after live post
        if: env.LIVE_POST == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/fetch_threads_insights.py
          python scripts/update_reaction_memory.py
          python scripts/analyze_learning.py

      - name: Commit live reaction memory
        if: env.LIVE_POST == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add \
            data/reaction_memory.json \
            output/reports/threads_insights.json \
            output/reports/reaction_memory.json \
            output/reports/learning.json \
            memory/reaction \
            memory/reports/weekly_report.md \
            reports/latest/context-pack.json
          if git diff --cached --quiet; then
            echo "No live reaction memory changes."
          else
            git commit -m "chore: update niche app signal os reaction memory"
            git push
          fi
