name: Niche App Signal OS Auto Post

on:
  workflow_dispatch:
    inputs:
      live_post:
        description: "Set true to allow Threads posting through all guards."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "10 0 * * *"
  push:
    branches: [main]
    paths:
      - ".github/niche-app-signal-os/post-now.txt"

permissions:
  contents: write

jobs:
  daily-post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: RAZOR_FACE_COMPANY/02_WEB_SERVICES/projects/niche-app-signal-os
    env:
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_AUTO_POST_ENABLED: ${{ secrets.THREADS_AUTO_POST_ENABLED }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      THREADS_TARGET_HANDLE: younengsaitoshaojie

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve posting mode
        shell: bash
        run: |
          set -euo pipefail
          LIVE_POST="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.live_post }}" = "true" ]; then
            LIVE_POST="true"
          fi
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${THREADS_AUTO_POST_ENABLED:-}" = "true" ]; then
            LIVE_POST="true"
          fi
          if [ "${{ github.event_name }}" = "push" ] && [ "${THREADS_AUTO_POST_ENABLED:-}" = "true" ]; then
            LIVE_POST="true"
            echo "THREADS_IMAGE_URL=https://raw.githubusercontent.com/naughtydream050-cloud/fishing-app/main/RAZOR_FACE_COMPANY/02_WEB_SERVICES/projects/niche-app-signal-os/output/share-cards/oshi-activity-management-A.png" >> "$GITHUB_ENV"
            echo "THREADS_POST_TEXT_OVERRIDE<<POSTTEXT" >> "$GITHUB_ENV"
            echo "現場のこと、あとで見返そうと思っても散らばりがちじゃない？" >> "$GITHUB_ENV"
            echo "" >> "$GITHUB_ENV"
            echo "座席はスクショ、セトリはメモ、遠征費は決済履歴、グッズは写真。" >> "$GITHUB_ENV"
            echo "" >> "$GITHUB_ENV"
            echo "ライブごとにまとめて残せる推し活ログの試作UIを作ってます。" >> "$GITHUB_ENV"
            echo "" >> "$GITHUB_ENV"
            echo "これ欲しい？それともNotionで十分？" >> "$GITHUB_ENV"
            echo "POSTTEXT" >> "$GITHUB_ENV"
            echo "THREADS_ALT_TEXT_OVERRIDE=推し活ログのスマホUI風カード。ライブ参戦ログ、座席、セトリメモ、チケット状態、同行者、感情タグ、遠征費合計をまとめて見返せる画面。" >> "$GITHUB_ENV"
            echo "THREADS_TOPIC_TAGS_OVERRIDE=推し活管理,ライブ参戦ログ,グッズ管理" >> "$GITHUB_ENV"
          fi

          if [ "$LIVE_POST" = "true" ]; then
            echo "AUTO_POST=true" >> "$GITHUB_ENV"
            echo "DRY_RUN=false" >> "$GITHUB_ENV"
            echo "PIPELINE_ARGS=--live-post" >> "$GITHUB_ENV"
          else
            echo "AUTO_POST=false" >> "$GITHUB_ENV"
            echo "DRY_RUN=true" >> "$GITHUB_ENV"
            echo "PIPELINE_ARGS=--dry-run" >> "$GITHUB_ENV"
          fi
          echo "Resolved live_post=${LIVE_POST}"

      - name: Preflight guard
        shell: bash
        run: |
          set -euo pipefail
          echo "DRY_RUN=${DRY_RUN}"
          echo "AUTO_POST=${AUTO_POST}"
          echo "THREADS_TARGET_HANDLE=${THREADS_TARGET_HANDLE}"
          if [ "${AUTO_POST}" = "true" ]; then
            test "${DRY_RUN}" = "false"
            test "${THREADS_AUTO_POST_ENABLED:-}" = "true"
            test -n "${THREADS_ACCESS_TOKEN:-}"
            test -n "${THREADS_USER_ID:-}"
            test "${THREADS_TARGET_HANDLE}" = "younengsaitoshaojie"
          fi

      - name: Verify tone pipeline order
        shell: bash
        run: |
          set -euo pipefail
          grep -n "design_intelligence" scripts/run_daily_pipeline.py
          grep -n "select_niche_candidate" scripts/run_daily_pipeline.py
          grep -n "audience_tone_adapter" scripts/run_daily_pipeline.py
          grep -n "generate_threads_post" scripts/run_daily_pipeline.py
          grep -n "generate_share_card" scripts/run_daily_pipeline.py
          grep -n "quality_risk_gate" scripts/run_daily_pipeline.py
          grep -n "select_post_candidate" scripts/run_daily_pipeline.py

      - name: Run Niche App Signal OS pipeline
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_daily_pipeline.py ${PIPELINE_ARGS}

      - name: Commit generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            output \
            memory \
            data/post_log.json \
            data/post_history.json \
            reports/latest/context-pack.json
          if git diff --cached --quiet; then
            echo "No generated artifact changes."
          else
            git commit -m "chore: run niche app signal os pipeline"
            git push
          fi
