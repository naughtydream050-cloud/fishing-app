<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">SPEC AI result proof card</title>
  <desc id="desc">A safe demo of SPEC AI outputs plus Free and Pro plan limits.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1726"/>
      <stop offset="1" stop-color="#132238"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <style>
      text { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .white { fill: #f8fafc; }
      .soft { fill: #dbeafe; }
      .muted { fill: #9fb0c7; }
      .panel { fill: #111827; stroke: #27354d; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="74" y="74" width="932" height="1202" rx="40" fill="#0f1726" stroke="#263248" stroke-width="2" filter="url(#shadow)"/>
  <text x="122" y="156" class="white" font-size="46" font-weight="800">SPEC AI</text>
  <text x="122" y="214" class="soft" font-size="34" font-weight="800">One cleanup. Three useful outputs.</text>
  <text x="122" y="260" class="muted" font-size="24">Safe demo content only. No private notes, no fake metrics.</text>

  <rect x="122" y="330" width="836" height="228" rx="28" class="panel"/>
  <text x="164" y="394" fill="#7dd3fc" font-size="28" font-weight="800">Summary</text>
  <text x="164" y="450" class="soft" font-size="28">The rough note is about launch prep.</text>
  <text x="164" y="494" class="soft" font-size="28">Pricing, mobile QA, and the recap are</text>
  <text x="164" y="538" class="soft" font-size="28">the next items to finish.</text>

  <rect x="122" y="596" width="836" height="250" rx="28" class="panel"/>
  <text x="164" y="660" fill="#86efac" font-size="28" font-weight="800">Tasks</text>
  <text x="164" y="718" class="soft" font-size="28">• tighten pricing copy</text>
  <text x="164" y="768" class="soft" font-size="28">• test upload flow on mobile</text>
  <text x="164" y="818" class="soft" font-size="28">• send a short partner recap</text>

  <rect x="122" y="884" width="836" height="218" rx="28" class="panel"/>
  <text x="164" y="948" fill="#fbbf24" font-size="28" font-weight="800">Share-ready text</text>
  <text x="164" y="1004" class="soft" font-size="27">Quick recap: launch prep is close.</text>
  <text x="164" y="1048" class="soft" font-size="27">Final focus is pricing clarity, mobile QA,</text>
  <text x="164" y="1092" class="soft" font-size="27">and a concise partner update.</text>

  <rect x="122" y="1142" width="390" height="92" rx="24" fill="#111f32" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="154" y="1178" class="muted" font-size="21">Free</text>
  <text x="154" y="1214" class="white" font-size="26" font-weight="800">1 successful analysis/day</text>
  <rect x="568" y="1142" width="390" height="92" rx="24" fill="#111f32" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="600" y="1178" class="muted" font-size="21">Pro</text>
  <text x="600" y="1214" class="white" font-size="26" font-weight="800">10/day · planned ¥300/mo</text>
  <rect x="122" y="1260" width="836" height="4" rx="2" fill="url(#accent)"/>
</svg>
