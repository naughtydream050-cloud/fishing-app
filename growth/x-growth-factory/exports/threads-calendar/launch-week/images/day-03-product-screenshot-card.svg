<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">SPEC AI product-style screenshot card</title>
  <desc id="desc">A product-style UI card showing where SPEC AI fits between messy capture and share-ready text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      text { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .white { fill: #f8fafc; }
      .soft { fill: #dbe7f5; }
      .muted { fill: #9aa9bd; }
      .panel { fill: #111827; stroke: #263248; stroke-width: 2; }
      .inner { fill: #0f1726; stroke: #263248; stroke-width: 1.5; }
    </style>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="76" y="78" width="928" height="1194" rx="40" fill="#0f1726" stroke="#263248" stroke-width="2" filter="url(#shadow)"/>
  <text x="122" y="158" class="white" font-size="46" font-weight="800">SPEC AI</text>
  <text x="122" y="214" class="soft" font-size="32" font-weight="700">After capture, before sharing.</text>
  <text x="122" y="258" class="muted" font-size="24">A focused cleanup step for rough notes.</text>
  <rect x="122" y="292" width="836" height="2" fill="#28364f"/>

  <rect x="122" y="350" width="836" height="670" rx="30" class="panel"/>
  <rect x="154" y="390" width="772" height="78" rx="20" fill="#0d1424" stroke="#28364f" stroke-width="1.5"/>
  <circle cx="196" cy="429" r="14" fill="#ef4444"/>
  <circle cx="236" cy="429" r="14" fill="#f59e0b"/>
  <circle cx="276" cy="429" r="14" fill="#22c55e"/>
  <text x="332" y="438" class="muted" font-size="22">spec-ai-alpha.vercel.app/app</text>

  <rect x="154" y="504" width="352" height="440" rx="24" class="inner"/>
  <text x="190" y="562" fill="#7dd3fc" font-size="24" font-weight="800">Input</text>
  <text x="190" y="612" class="white" font-size="28" font-weight="700">Messy notes</text>
  <rect x="190" y="652" width="270" height="16" rx="8" fill="#334155"/>
  <rect x="190" y="690" width="232" height="16" rx="8" fill="#334155"/>
  <rect x="190" y="728" width="284" height="16" rx="8" fill="#334155"/>
  <rect x="190" y="766" width="210" height="16" rx="8" fill="#334155"/>
  <rect x="190" y="824" width="198" height="52" rx="18" fill="url(#accent)"/>
  <text x="222" y="858" fill="#07111f" font-size="22" font-weight="800">Analyze</text>

  <rect x="542" y="504" width="352" height="440" rx="24" class="inner"/>
  <text x="578" y="562" fill="#86efac" font-size="24" font-weight="800">Output</text>
  <text x="578" y="612" class="white" font-size="28" font-weight="700">Ready to use</text>
  <text x="578" y="674" fill="#7dd3fc" font-size="23" font-weight="800">Summary</text>
  <rect x="578" y="700" width="250" height="12" rx="6" fill="#475569"/>
  <rect x="578" y="724" width="210" height="12" rx="6" fill="#475569"/>
  <text x="578" y="782" fill="#7dd3fc" font-size="23" font-weight="800">Tasks</text>
  <rect x="578" y="810" width="232" height="12" rx="6" fill="#475569"/>
  <rect x="578" y="834" width="190" height="12" rx="6" fill="#475569"/>
  <text x="578" y="892" fill="#7dd3fc" font-size="23" font-weight="800">Share text</text>
  <rect x="578" y="918" width="268" height="12" rx="6" fill="#475569"/>

  <g transform="translate(122 1080)">
    <rect width="238" height="94" rx="24" fill="#111f32" stroke="#2a3a55" stroke-width="1.5"/>
    <text x="34" y="39" class="muted" font-size="20">Step 1</text>
    <text x="34" y="70" class="white" font-size="24" font-weight="800">Capture notes</text>
    <rect x="300" width="238" height="94" rx="24" fill="#111f32" stroke="#2a3a55" stroke-width="1.5"/>
    <text x="334" y="39" class="muted" font-size="20">Step 2</text>
    <text x="334" y="70" class="white" font-size="24" font-weight="800">Run SPEC AI</text>
    <rect x="600" width="238" height="94" rx="24" fill="#111f32" stroke="#2a3a55" stroke-width="1.5"/>
    <text x="634" y="39" class="muted" font-size="20">Step 3</text>
    <text x="634" y="70" class="white" font-size="24" font-weight="800">Share clearly</text>
  </g>
</svg>
