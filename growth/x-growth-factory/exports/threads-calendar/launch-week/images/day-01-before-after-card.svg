<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">SPEC AI before and after card</title>
  <desc id="desc">A safe demo showing messy meeting notes becoming a summary, tasks, and share-ready text.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1220"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <style>
      text { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .muted { fill: #a6b0c3; }
      .white { fill: #f8fafc; }
      .soft { fill: #d8e0ef; }
      .panel { fill: #121a2a; stroke: #263248; stroke-width: 2; }
      .chip { fill: #17243a; stroke: #2a3a55; stroke-width: 1.5; }
    </style>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <circle cx="904" cy="168" r="160" fill="#12314a" opacity="0.4"/>
  <circle cx="146" cy="1120" r="190" fill="#15352e" opacity="0.34"/>
  <rect x="72" y="72" width="936" height="1206" rx="36" fill="#0f1726" stroke="#243044" stroke-width="2" filter="url(#shadow)"/>
  <text x="118" y="158" class="white" font-size="46" font-weight="800">SPEC AI</text>
  <rect x="118" y="186" width="258" height="8" rx="4" fill="url(#accent)"/>
  <text x="118" y="248" class="soft" font-size="34" font-weight="700">messy notes → usable output</text>
  <text x="118" y="294" class="muted" font-size="24">Turn rough text into summary, tasks, and share-ready text.</text>

  <rect x="112" y="374" width="404" height="658" rx="26" class="panel"/>
  <text x="150" y="438" fill="#fca5a5" font-size="26" font-weight="800">BEFORE</text>
  <text x="150" y="486" class="white" font-size="30" font-weight="700">Messy meeting notes</text>
  <rect x="150" y="526" width="328" height="1.5" fill="#2e3b54"/>
  <text x="150" y="586" class="muted" font-size="25">call with team</text>
  <text x="150" y="634" class="muted" font-size="25">launch page maybe Tue?</text>
  <text x="150" y="682" class="muted" font-size="25">pricing copy unclear</text>
  <text x="150" y="730" class="muted" font-size="25">need tasks for upload QA</text>
  <text x="150" y="778" class="muted" font-size="25">send recap to partner</text>
  <text x="150" y="826" class="muted" font-size="25">check mobile layout again</text>
  <rect x="150" y="884" width="286" height="56" rx="16" class="chip"/>
  <text x="174" y="920" fill="#fca5a5" font-size="22" font-weight="700">Useful, but not usable yet</text>

  <rect x="564" y="374" width="404" height="658" rx="26" class="panel"/>
  <text x="602" y="438" fill="#86efac" font-size="26" font-weight="800">AFTER</text>
  <text x="602" y="486" class="white" font-size="30" font-weight="700">SPEC AI output</text>
  <rect x="602" y="526" width="328" height="1.5" fill="#2e3b54"/>
  <text x="602" y="586" fill="#7dd3fc" font-size="24" font-weight="800">Summary</text>
  <text x="602" y="628" class="soft" font-size="23">Launch work is moving, but</text>
  <text x="602" y="664" class="soft" font-size="23">pricing copy and mobile QA</text>
  <text x="602" y="700" class="soft" font-size="23">need one final pass.</text>
  <text x="602" y="768" fill="#7dd3fc" font-size="24" font-weight="800">Tasks</text>
  <text x="602" y="810" class="soft" font-size="23">• tighten pricing copy</text>
  <text x="602" y="846" class="soft" font-size="23">• run upload QA</text>
  <text x="602" y="882" class="soft" font-size="23">• send partner recap</text>
  <text x="602" y="950" fill="#7dd3fc" font-size="24" font-weight="800">Share text</text>
  <text x="602" y="992" class="soft" font-size="23">Quick recap: launch page is</text>
  <text x="602" y="1028" class="soft" font-size="23">close. Final focus is pricing,</text>
  <text x="602" y="1064" class="soft" font-size="23">upload QA, and mobile polish.</text>

  <rect x="118" y="1120" width="844" height="92" rx="24" fill="#111f32" stroke="#2a3a55" stroke-width="1.5"/>
  <text x="154" y="1177" class="white" font-size="28" font-weight="800">Free: 1 analysis/day</text>
  <text x="508" y="1177" fill="#86efac" font-size="28" font-weight="800">Try one cleanup today</text>
</svg>
