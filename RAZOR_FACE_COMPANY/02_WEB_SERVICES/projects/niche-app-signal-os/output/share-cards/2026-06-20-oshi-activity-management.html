<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=1080, initial-scale=1"><title>oshi-activity-management</title><style>*{box-sizing:border-box}body{margin:0;width:1080px;height:1350px;background:#f8f4ff;font-family:"Yu Gothic","Hiragino Sans","Noto Sans JP",Arial,sans-serif;color:#282436}.canvas{width:1080px;height:1350px;padding:72px 74px;background:linear-gradient(160deg,#fff5fb 0%,#f4fbff 45%,#f7fff3 100%)}.top{height:232px;display:flex;flex-direction:column;justify-content:flex-end}.eyebrow{font-size:30px;font-weight:700;color:#7e6aa8;margin-bottom:18px}h1{font-size:58px;line-height:1.16;margin:0;letter-spacing:0;font-weight:900;color:#272132}.phone-wrap{height:800px;display:flex;align-items:center;justify-content:center}.phone{width:650px;height:742px;border-radius:58px;background:#24202f;padding:24px;box-shadow:0 34px 70px rgba(80,61,111,.23)}.screen{height:100%;border-radius:40px;background:#fffdfb;padding:34px 30px;overflow:hidden}.app-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}.app-title{font-size:32px;font-weight:900}.pill{font-size:22px;font-weight:800;color:#6552a2;background:#eee8ff;border-radius:999px;padding:10px 16px}.hero-card{background:#eafff5;border:2px solid #b9efd5;border-radius:26px;padding:20px 22px;margin-bottom:18px}.hero-card .label{font-size:22px;color:#6d7780;font-weight:800}.hero-card .main{font-size:34px;font-weight:900;margin-top:8px}.row{display:grid;grid-template-columns:180px 1fr;gap:18px;align-items:center;background:#fff;border:2px solid #eee8f5;border-radius:22px;padding:20px;margin:16px 0;box-shadow:0 8px 20px rgba(92,77,118,.06)}.row span{font-size:22px;color:#82778e;font-weight:800}.row strong{font-size:25px;line-height:1.25;color:#2d2838}.footer{height:184px;display:flex;align-items:flex-start;justify-content:space-between;gap:26px}.cta{font-size:40px;line-height:1.25;font-weight:900;color:#2c2538;max-width:680px}.badge{font-size:24px;font-weight:900;color:#fff;background:#ff7aa8;border-radius:999px;padding:16px 22px;white-space:nowrap}</style></head><body><main class="canvas"><section class="top"><div class="eyebrow">こういうの、地味に欲しくない？</div><h1>推し活の記録、気づいたら大散乱してない？</h1></section><section class="phone-wrap"><div class="phone"><div class="screen"><div class="app-head"><div class="app-title">現場ログボード</div><div class="pill">DRY RUN</div></div><div class="hero-card"><div class="label">NEO ARENA / 18:30</div><div class="main">推し活ログ</div></div><div class="row"><span>座席</span><strong>2階 Cブロック 14列</strong></div>
<div class="row"><span>セトリメモ</span><strong>アンコールで泣いた曲だけ残す</strong></div>
<div class="row"><span>買ったグッズ</span><strong>アクスタ / タオル / ランダム2</strong></div>
<div class="row"><span>遠征費と感情</span><strong>20,200円 / 余韻・最高</strong></div></div></div></section><section class="footer"><div class="cta">これ欲しい？それともNotionで十分？</div><div class="badge">Threads案</div></section></main></body></html>
