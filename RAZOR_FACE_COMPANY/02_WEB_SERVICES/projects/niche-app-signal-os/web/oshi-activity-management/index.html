<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>推し活ログボード</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local-first MVP / DRY_RUN</p>
          <h1>推し活ログボード</h1>
        </div>
        <div class="topbar-actions" aria-label="データ操作">
          <button class="button secondary" id="exportButton" type="button">Export</button>
          <button class="button secondary" id="importButton" type="button">Import</button>
          <button class="button secondary" id="clearButton" type="button">Clear</button>
          <input id="importFile" type="file" accept="application/json" hidden />
        </div>
      </header>

      <nav class="tabs" aria-label="画面切り替え">
        <button class="tab active" type="button" data-view="dashboard">ダッシュボード</button>
        <button class="tab" type="button" data-view="live">ライブ参戦ログ</button>
        <button class="tab" type="button" data-view="goods">グッズ管理</button>
        <button class="tab" type="button" data-view="travel">遠征費</button>
        <button class="tab" type="button" data-view="memo">メモ</button>
      </nav>

      <main>
        <section class="view active" id="dashboardView" aria-labelledby="dashboardTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">Overview</p>
              <h2 id="dashboardTitle">ダッシュボード</h2>
            </div>
            <button class="button primary" id="quickLiveButton" type="button">ライブを追加</button>
          </div>

          <div class="summary-grid" aria-label="集計">
            <div class="metric">
              <span>ライブ件数</span>
              <strong id="metricLives">0</strong>
            </div>
            <div class="metric">
              <span>グッズ総額</span>
              <strong id="metricGoods">¥0</strong>
            </div>
            <div class="metric">
              <span>遠征費総額</span>
              <strong id="metricTravel">¥0</strong>
            </div>
            <div class="metric">
              <span>次の予定</span>
              <strong id="metricNext">未登録</strong>
            </div>
          </div>

          <div class="dashboard-grid">
            <section class="panel">
              <div class="panel-head">
                <h3>直近のライブ</h3>
              </div>
              <div class="compact-list" id="recentLiveList"></div>
            </section>
            <section class="panel">
              <div class="panel-head">
                <h3>最近のメモ</h3>
              </div>
              <div class="compact-list" id="recentMemoList"></div>
            </section>
          </div>
        </section>

        <section class="view" id="liveView" aria-labelledby="liveTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">Live Log</p>
              <h2 id="liveTitle">ライブ参戦ログ</h2>
            </div>
            <button class="button primary" data-add="live" type="button">追加</button>
          </div>
          <div class="workspace">
            <div class="panel list-panel">
              <div class="record-list" id="liveList"></div>
            </div>
            <form class="panel form-grid" id="liveForm">
              <input type="hidden" name="id" />
              <label><span>event_name</span><input name="event_name" required /></label>
              <label><span>artist_or_group</span><input name="artist_or_group" /></label>
              <label><span>date</span><input name="date" type="date" /></label>
              <label><span>venue</span><input name="venue" /></label>
              <label><span>seat</span><input name="seat" /></label>
              <label>
                <span>ticket_status</span>
                <select name="ticket_status">
                  <option value="未設定">未設定</option>
                  <option value="申込前">申込前</option>
                  <option value="申込済み">申込済み</option>
                  <option value="当選">当選</option>
                  <option value="落選">落選</option>
                  <option value="入金済み">入金済み</option>
                  <option value="発券済み">発券済み</option>
                </select>
              </label>
              <label><span>companion</span><input name="companion" /></label>
              <label><span>emotion_tag</span><input name="emotion_tag" placeholder="最高 / 泣いた / 余韻" /></label>
              <label><span>cost</span><input name="cost" type="number" min="0" step="100" /></label>
              <label class="wide"><span>setlist_note</span><textarea name="setlist_note" rows="4"></textarea></label>
              <label class="wide"><span>memo</span><textarea name="memo" rows="4"></textarea></label>
              <div class="form-actions">
                <button class="button danger" data-delete="live" type="button">削除</button>
                <button class="button primary" type="submit">保存</button>
              </div>
            </form>
          </div>
        </section>

        <section class="view" id="goodsView" aria-labelledby="goodsTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">Goods</p>
              <h2 id="goodsTitle">グッズ管理</h2>
            </div>
            <button class="button primary" data-add="goods" type="button">追加</button>
          </div>
          <div class="workspace">
            <div class="panel list-panel">
              <div class="record-list" id="goodsList"></div>
            </div>
            <form class="panel form-grid" id="goodsForm">
              <input type="hidden" name="id" />
              <label><span>name</span><input name="name" required /></label>
              <label><span>category</span><input name="category" /></label>
              <label><span>price</span><input name="price" type="number" min="0" step="100" /></label>
              <label><span>purchase_date</span><input name="purchase_date" type="date" /></label>
              <label><span>owned_count</span><input name="owned_count" type="number" min="0" step="1" /></label>
              <label class="wide"><span>memo</span><textarea name="memo" rows="5"></textarea></label>
              <div class="form-actions">
                <button class="button danger" data-delete="goods" type="button">削除</button>
                <button class="button primary" type="submit">保存</button>
              </div>
            </form>
          </div>
        </section>

        <section class="view" id="travelView" aria-labelledby="travelTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">Travel Cost</p>
              <h2 id="travelTitle">遠征費</h2>
            </div>
            <button class="button primary" data-add="travel" type="button">追加</button>
          </div>
          <div class="workspace">
            <div class="panel list-panel">
              <div class="record-list" id="travelList"></div>
            </div>
            <form class="panel form-grid" id="travelForm">
              <input type="hidden" name="id" />
              <label class="wide"><span>event_name</span><input name="event_name" required /></label>
              <label><span>transport</span><input name="transport" type="number" min="0" step="100" /></label>
              <label><span>hotel</span><input name="hotel" type="number" min="0" step="100" /></label>
              <label><span>food</span><input name="food" type="number" min="0" step="100" /></label>
              <label><span>goods</span><input name="goods" type="number" min="0" step="100" /></label>
              <label><span>other</span><input name="other" type="number" min="0" step="100" /></label>
              <label><span>total</span><input name="total" type="number" min="0" step="100" readonly /></label>
              <div class="form-actions">
                <button class="button danger" data-delete="travel" type="button">削除</button>
                <button class="button primary" type="submit">保存</button>
              </div>
            </form>
          </div>
        </section>

        <section class="view" id="memoView" aria-labelledby="memoTitle">
          <div class="section-head">
            <div>
              <p class="eyebrow">Memory</p>
              <h2 id="memoTitle">メモ</h2>
            </div>
            <button class="button primary" data-add="memo" type="button">追加</button>
          </div>
          <div class="workspace">
            <div class="panel list-panel">
              <div class="record-list" id="memoList"></div>
            </div>
            <form class="panel form-grid" id="memoForm">
              <input type="hidden" name="id" />
              <label><span>title</span><input name="title" required /></label>
              <label><span>date</span><input name="date" type="date" /></label>
              <label class="wide"><span>body</span><textarea name="body" rows="8"></textarea></label>
              <div class="form-actions">
                <button class="button danger" data-delete="memo" type="button">削除</button>
                <button class="button primary" type="submit">保存</button>
              </div>
            </form>
          </div>
        </section>
      </main>

      <p class="status-line" id="statusLine" role="status"></p>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
